version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging to ECR...
      - aws --version
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 009334261981.dkr.ecr.us-east-1.amazonaws.com
      - IMAGE_TAG=build-$(echo $CODEBUILD_BUILD_ID | awk -F":" '{print $2}')
      - echo Image tag = $IMAGE_TAG

  build:
    commands:
      - echo Building Docker image...
      - docker build -t springboot-lambda .
      - docker tag springboot-lambda:latest 009334261981.dkr.ecr.us-east-1.amazonaws.com/springboot-lambda:$IMAGE_TAG

  post_build:
    commands:
      - echo Pushing image to ECR...
      - docker push 009334261981.dkr.ecr.us-east-1.amazonaws.com/springboot-lambda:$IMAGE_TAG
      - echo Build completed successfully

